name: Build release artifacts

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  relay-matrix:
    name: Relay • ${{ matrix.goos }}-${{ matrix.arch_label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            goarm: ''
            artifact: deskgo-relay-darwin-amd64
            arch_label: amd64
          - goos: darwin
            goarch: arm64
            goarm: ''
            artifact: deskgo-relay-darwin-arm64
            arch_label: arm64
          - goos: linux
            goarch: amd64
            goarm: ''
            artifact: deskgo-relay-linux-amd64
            arch_label: amd64
          - goos: linux
            goarch: arm64
            goarm: ''
            artifact: deskgo-relay-linux-arm64
            arch_label: arm64
          - goos: linux
            goarch: arm
            goarm: '7'
            artifact: deskgo-relay-linux-armv7
            arch_label: armv7
          - goos: linux
            goarch: riscv64
            goarm: ''
            artifact: deskgo-relay-linux-riscv64
            arch_label: riscv64
          - goos: linux
            goarch: ppc64le
            goarm: ''
            artifact: deskgo-relay-linux-ppc64le
            arch_label: ppc64le
          - goos: linux
            goarch: s390x
            goarm: ''
            artifact: deskgo-relay-linux-s390x
            arch_label: s390x
          - goos: windows
            goarch: amd64
            goarm: ''
            artifact: deskgo-relay-windows-amd64.exe
            arch_label: amd64
          - goos: windows
            goarch: arm64
            goarm: ''
            artifact: deskgo-relay-windows-arm64.exe
            arch_label: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build relay artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ -n "${{ matrix.goarm }}" ]]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} CGO_ENABLED=0 go build -o dist/${{ matrix.artifact }} ./cmd/relay
          else
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o dist/${{ matrix.artifact }} ./cmd/relay
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.goos }}-${{ matrix.arch_label }}
          path: dist/${{ matrix.artifact }}

  desktop-cross:
    name: Desktop CLI • ${{ matrix.goos }}-${{ matrix.arch_label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ''
            artifact: deskgo-desktop-linux-amd64
            arch_label: amd64
          - goos: linux
            goarch: arm64
            goarm: ''
            artifact: deskgo-desktop-linux-arm64
            arch_label: arm64
          - goos: linux
            goarch: arm
            goarm: '7'
            artifact: deskgo-desktop-linux-armv7
            arch_label: armv7
          - goos: linux
            goarch: riscv64
            goarm: ''
            artifact: deskgo-desktop-linux-riscv64
            arch_label: riscv64
          - goos: windows
            goarch: amd64
            goarm: ''
            artifact: deskgo-desktop-windows-amd64.exe
            arch_label: amd64
          - goos: windows
            goarch: arm64
            goarm: ''
            artifact: deskgo-desktop-windows-arm64.exe
            arch_label: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build desktop artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ -n "${{ matrix.goarm }}" ]]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} CGO_ENABLED=0 go build -tags desktop -o dist/${{ matrix.artifact }} ./cmd/client
          else
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -tags desktop -o dist/${{ matrix.artifact }} ./cmd/client
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.goos }}-${{ matrix.arch_label }}
          path: dist/${{ matrix.artifact }}

  desktop-macos:
    name: Desktop CLI • macOS-${{ matrix.arch_label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            goarch: amd64
            artifact: deskgo-desktop-darwin-amd64
            arch_label: amd64
          - runner: macos-15
            goarch: arm64
            artifact: deskgo-desktop-darwin-arm64
            arch_label: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build macOS desktop artifact
        shell: bash
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 go build -tags desktop -o dist/${{ matrix.artifact }} ./cmd/client
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-darwin-${{ matrix.arch_label }}
          path: dist/${{ matrix.artifact }}

  sign-windows-artifacts:
    name: Sign Windows artifacts
    runs-on: windows-latest
    needs:
      - relay-matrix
      - desktop-cross
    steps:
      - uses: actions/checkout@v4
      - name: Install osslsigncode
        run: |
          choco install osslsigncode -y
          osslsigncode --version
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-windows-*'
          merge-multiple: true
          path: dist
      - name: List downloaded files
        shell: pwsh
        run: |
          Write-Host "Downloaded files:"
          Get-ChildItem -Path dist -Recurse | Select-Object FullName
      - name: Decode certificate
        shell: pwsh
        run: |
          $certBase64 = "${{ secrets.CERTIFICATE_PFX_BASE64 }}"
          if ($certBase64) {
            $certBytes = [System.Convert]::FromBase64String($certBase64)
            [System.IO.File]::WriteAllBytes("certificate.pfx", $certBytes)
            Write-Host "Certificate decoded successfully"
            "HAS_CERT=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "Warning: CERTIFICATE_PFX_BASE64 secret not found, skipping signing"
            "HAS_CERT=false" >> $env:GITHUB_ENV
          }
      - name: Sign Windows executables
        shell: pwsh
        if: env.HAS_CERT == 'true'
        run: |
          Get-ChildItem -Path dist -Filter *.exe | ForEach-Object {
            $exeFile = $_.FullName
            $signedFile = "$exeFile.signed"
            $artifactName = $_.Name

            Write-Host "Signing $artifactName..."
            osslsigncode sign `
              -pkcs12 certificate.pfx `
              -pass "${{ secrets.CERTIFICATE_PASSWORD }}" `
              -n "DeskGo" `
              -i "https://github.com/topcheer/deskgo" `
              -t http://timestamp.digicert.com `
              -h sha256 `
              -in $exeFile `
              -out $signedFile

            Move-Item -Force $signedFile $exeFile
            Write-Host "✓ $artifactName signed"
          }
      - name: Upload signed Windows artifacts separately
        uses: actions/upload-artifact@v4
        if: env.HAS_CERT == 'true'
        with:
          name: windows-signed
          path: dist/*.exe
      - name: Verify signatures
        shell: pwsh
        continue-on-error: true
        if: env.HAS_CERT == 'true'
        run: |
          Get-ChildItem -Path dist -Filter *.exe | ForEach-Object {
            Write-Host "Verifying $($_.Name)..."
            osslsigncode verify -in $_.FullName | Out-Null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✓ $($_.Name) signature verified"
            } else {
              Write-Host "⚠ $($_.Name) verification warning (expected for self-signed certificates)"
            }
          }
          Write-Host "Signature verification complete (self-signed certificates will show warnings)"

  package-bundle:
    name: Package artifact bundle
    runs-on: ubuntu-latest
    needs:
      - relay-matrix
      - desktop-cross
      - desktop-macos
      - sign-windows-artifacts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-*'
          merge-multiple: true
          path: dist
      - name: Replace Windows artifacts with signed versions
        shell: bash
        run: |
          # Check if windows-signed artifact exists
          if compgen -G "windows-signed/*.exe" > /dev/null; then
            echo "Found signed Windows artifacts, replacing unsigned versions..."
            for f in windows-signed/*.exe; do
              if [ -f "$f" ]; then
                basename=$(basename "$f")
                echo "  Replacing $basename with signed version"
                cp "$f" "dist/$basename"
              fi
            done
            echo "✓ Windows artifacts replaced with signed versions"
          else
            echo "No signed Windows artifacts found, using unsigned versions"
          fi
      - name: Include autostart installer scripts
        shell: bash
        run: |
          cp scripts/deskgo-autostart.sh dist/deskgo-autostart.sh
          cp scripts/deskgo-autostart.ps1 dist/deskgo-autostart.ps1
      - name: Generate SHA256 manifest
        shell: bash
        run: |
          cd dist
          sha256sum * | sort > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deskgo-release-bundle
          path: dist/*
      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="release-notes.md"
          notes_en="docs/releases/${tag}.md"
          notes_zh="docs/releases/${tag}.zh-CN.md"

          if [[ -f "${notes_en}" ]]; then
            cat "${notes_en}" > "${notes_file}"
          else
            printf "# %s\n\nAutomated DeskGo release.\n" "${tag}" > "${notes_file}"
          fi

          if [[ -f "${notes_zh}" ]]; then
            printf "\n\n---\n\n" >> "${notes_file}"
            cat "${notes_zh}" >> "${notes_file}"
          fi

          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: DeskGo ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            dist/*
