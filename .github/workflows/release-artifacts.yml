name: Build release artifacts

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  relay-matrix:
    name: Relay • ${{ matrix.goos }}-${{ matrix.arch_label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            goarm: ''
            artifact: deskgo-relay-darwin-amd64
            arch_label: amd64
          - goos: darwin
            goarch: arm64
            goarm: ''
            artifact: deskgo-relay-darwin-arm64
            arch_label: arm64
          - goos: linux
            goarch: amd64
            goarm: ''
            artifact: deskgo-relay-linux-amd64
            arch_label: amd64
          - goos: linux
            goarch: arm64
            goarm: ''
            artifact: deskgo-relay-linux-arm64
            arch_label: arm64
          - goos: linux
            goarch: arm
            goarm: '7'
            artifact: deskgo-relay-linux-armv7
            arch_label: armv7
          - goos: linux
            goarch: riscv64
            goarm: ''
            artifact: deskgo-relay-linux-riscv64
            arch_label: riscv64
          - goos: linux
            goarch: ppc64le
            goarm: ''
            artifact: deskgo-relay-linux-ppc64le
            arch_label: ppc64le
          - goos: linux
            goarch: s390x
            goarm: ''
            artifact: deskgo-relay-linux-s390x
            arch_label: s390x
          - goos: windows
            goarch: amd64
            goarm: ''
            artifact: deskgo-relay-windows-amd64.exe
            arch_label: amd64
          - goos: windows
            goarch: arm64
            goarm: ''
            artifact: deskgo-relay-windows-arm64.exe
            arch_label: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build relay artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ -n "${{ matrix.goarm }}" ]]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} CGO_ENABLED=0 go build -o dist/${{ matrix.artifact }} ./cmd/relay
          else
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o dist/${{ matrix.artifact }} ./cmd/relay
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.goos }}-${{ matrix.arch_label }}
          path: dist/${{ matrix.artifact }}

  desktop-cross:
    name: Desktop CLI • ${{ matrix.goos }}-${{ matrix.arch_label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ''
            artifact: deskgo-desktop-linux-amd64
            arch_label: amd64
          - goos: linux
            goarch: arm64
            goarm: ''
            artifact: deskgo-desktop-linux-arm64
            arch_label: arm64
          - goos: linux
            goarch: arm
            goarm: '7'
            artifact: deskgo-desktop-linux-armv7
            arch_label: armv7
          - goos: linux
            goarch: riscv64
            goarm: ''
            artifact: deskgo-desktop-linux-riscv64
            arch_label: riscv64
          - goos: windows
            goarch: amd64
            goarm: ''
            artifact: deskgo-desktop-windows-amd64.exe
            arch_label: amd64
          - goos: windows
            goarch: arm64
            goarm: ''
            artifact: deskgo-desktop-windows-arm64.exe
            arch_label: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build desktop artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ -n "${{ matrix.goarm }}" ]]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} CGO_ENABLED=0 go build -tags desktop -o dist/${{ matrix.artifact }} ./cmd/client
          else
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -tags desktop -o dist/${{ matrix.artifact }} ./cmd/client
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.goos }}-${{ matrix.arch_label }}
          path: dist/${{ matrix.artifact }}

  desktop-macos:
    name: Desktop CLI • macOS-${{ matrix.arch_label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            goarch: amd64
            artifact: deskgo-desktop-darwin-amd64
            arch_label: amd64
          - runner: macos-14
            goarch: arm64
            artifact: deskgo-desktop-darwin-arm64
            arch_label: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build macOS desktop artifact
        shell: bash
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 go build -tags desktop -o dist/${{ matrix.artifact }} ./cmd/client
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-darwin-${{ matrix.arch_label }}
          path: dist/${{ matrix.artifact }}

  package-bundle:
    name: Package artifact bundle
    runs-on: ubuntu-latest
    needs:
      - relay-matrix
      - desktop-cross
      - desktop-macos
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-*'
          merge-multiple: true
          path: dist
      - name: Generate SHA256 manifest
        shell: bash
        run: |
          cd dist
          sha256sum * | sort > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deskgo-release-bundle
          path: dist/*
