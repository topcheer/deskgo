<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>DeskGo - 远程桌面 v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }

        .header {
            background: #2d2d2d;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3d3d3d;
        }

        .header h1 {
            font-size: 1.2em;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .control-toggle input {
            cursor: pointer;
        }

        .control-toggle label {
            cursor: pointer;
            user-select: none;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: #44ff44;
        }

        .status-dot.connecting {
            background: #ffaa44;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #888;
            font-size: 0.9em;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 50px);
        }

        #screen {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #vnc_canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
        }

        .loading {
            text-align: center;
            color: #888;
        }

        .loading-spinner {
            border: 3px solid #3d3d3d;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-bar {
            background: #2d2d2d;
            padding: 8px 20px;
            font-size: 0.85em;
            color: #888;
            display: flex;
            gap: 20px;
            justify-content: center;
            border-top: 1px solid #3d3d3d;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-value {
            color: #667eea;
            font-weight: bold;
        }

        .quality-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .quality-bar {
            width: 50px;
            height: 4px;
            background: #3d3d3d;
            border-radius: 2px;
            overflow: hidden;
        }

        .quality-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ffaa44, #44ff44);
            transition: width 0.3s;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1em;
            }

            .info-bar {
                flex-wrap: wrap;
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖥️ DeskGo 远程桌面</h1>
        <div class="status">
            <div class="control-toggle">
                <input type="checkbox" id="controlToggle" checked>
                <label for="controlToggle">启用控制</label>
            </div>
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">连接中...</span>
        </div>
    </div>

    <div class="container">
        <div id="screen">
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>正在连接到远程桌面...</p>
                <p style="font-size: 0.9em; margin-top: 10px; color: #666;">会话ID: <span id="sessionIdDisplay"></span></p>
            </div>
            <canvas id="vnc_canvas" style="display: none;"></canvas>
        </div>

        <div class="info-bar">
            <div class="info-item">
                分辨率: <span class="info-value" id="resolution">-</span>
            </div>
            <div class="info-item">
                帧率: <span class="info-value" id="fps">-</span>
            </div>
            <div class="info-item">
                延迟: <span class="info-value" id="latency">-</span>
            </div>
            <div class="info-item">
                会话: <span class="info-value" id="sessionId">-</span>
            </div>
            <div class="quality-indicator">
                质量:
                <div class="quality-bar">
                    <div class="quality-fill" id="qualityFill" style="width: 80%"></div>
                </div>
                <span class="info-value" id="qualityText">良好</span>
            </div>
        </div>
    </div>

    <script>
        const sessionId = '{{ .sessionID }}';

        // 根据页面协议自动选择 WebSocket 协议
        // HTTPS -> WSS, HTTP -> WS
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsURL = `${wsProtocol}//${window.location.host}/api/desktop/${sessionId}?type=web&user_id=web-${Date.now()}`;

        let ws = null;
        let isConnected = false;
        let canvas = null;
        let ctx = null;
        let frameCount = 0;
        let lastFrameTime = performance.now();
        let fpsUpdateInterval = null;

        // H.264 解码器
        let h264Decoder = null;
        let useH264 = false;
        let sps = null;
        let pps = null;

        // 检测编解码器支持
        function detectCodecSupport() {
            return {
                h264: 'VideoDecoder' in window && 'VideoEncoder' in window,
                jpeg: true
            };
        }

        const codecSupport = detectCodecSupport();
        console.log('=== 编解码器支持检测 ===');
        console.log('VideoDecoder 可用:', 'VideoDecoder' in window);
        console.log('VideoEncoder 可用:', 'VideoEncoder' in window);
        console.log('H.264 支持:', codecSupport.h264);
        console.log('JPEG 支持:', codecSupport.jpeg);
        console.log('完整对象:', codecSupport);
        console.log('======================');

        // 连接状态管理
        function setStatus(status, text) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            dot.className = 'status-dot ' + status;
            statusText.textContent = text;

            if (status === 'connected') {
                isConnected = true;
                document.getElementById('loading').style.display = 'none';
                // Canvas将在init消息中初始化和显示
            }
        }

        // 更新帧率统计
        function updateFPS() {
            const now = performance.now();
            const elapsed = now - lastFrameTime;
            const fps = Math.round((frameCount * 1000) / elapsed);

            document.getElementById('fps').textContent = fps + ' FPS';

            // 根据帧率更新质量指示
            const qualityFill = document.getElementById('qualityFill');
            const qualityText = document.getElementById('qualityText');

            if (fps >= 25) {
                qualityFill.style.width = '100%';
                qualityText.textContent = '优秀';
            } else if (fps >= 15) {
                qualityFill.style.width = '70%';
                qualityText.textContent = '良好';
            } else if (fps >= 10) {
                qualityFill.style.width = '40%';
                qualityText.textContent = '一般';
            } else {
                qualityFill.style.width = '20%';
                qualityText.textContent = '较差';
            }

            // 重置计数
            frameCount = 0;
            lastFrameTime = now;
        }

        // H264Decoder H.264 解码器类
        class H264Decoder {
            constructor() {
                this.decoder = null;
                this.sps = null;
                this.pps = null;
                this.initialized = false;
            }

            async init() {
                if (!codecSupport.h264) {
                    throw new Error('VideoDecoder 不支持');
                }

                this.decoder = new VideoDecoder({
                    output: (frame) => this.onFrameDecoded(frame),
                    error: (e) => this.onError(e)
                });

                console.log('H.264 解码器已创建');
            }

            async decode(data, isKeyFrame, sps, pps) {
                console.log('🔹 decode() 被调用:', {
                    dataLength: data.length,
                    isKeyFrame,
                    hasSps: !!sps,
                    hasPps: !!pps,
                    spsLength: sps ? sps.length : 0,
                    ppsLength: pps ? pps.length : 0,
                    initialized: this.initialized,
                    decoderState: this.decoder ? this.decoder.state : 'no decoder'
                });

                // 更新 SPS/PPS
                if (sps && sps.length > 0) {
                    this.sps = new Uint8Array(sps);
                    console.log('📹 SPS 已更新，长度:', sps.length);
                }
                if (pps && pps.length > 0) {
                    this.pps = new Uint8Array(pps);
                    console.log('📹 PPS 已更新，长度:', pps.length);
                }

                // 配置解码器（使用 SPS/PPS）
                if (!this.initialized && this.sps && this.pps) {
                    console.log('🔹 开始配置解码器...');
                    try {
                        const codecDesc = this.createDecoderConfig(this.sps, this.pps);
                        console.log('🔹 配置参数:', {
                            codec: codecDesc.codec,
                            descriptionSize: codecDesc.description.length
                        });

                        await this.decoder.configure(codecDesc);
                        console.log('🔹 configure() 调用完成，状态:', this.decoder.state);

                        if (this.decoder.state === 'configured') {
                            this.initialized = true;
                            console.log('✅ H.264 解码器已配置');
                        } else {
                            console.warn('⚠️ 解码器配置失败，状态:', this.decoder.state);
                            // 重新创建解码器
                            this.decoder = new VideoDecoder({
                                output: (frame) => this.onFrameDecoded(frame),
                                error: (e) => this.onError(e)
                            });
                        }
                    } catch (e) {
                        console.error('❌ 配置 H.264 解码器失败，重新创建:', e);
                        console.error('   错误堆栈:', e.stack);
                        // 重新创建解码器
                        this.decoder = new VideoDecoder({
                            output: (frame) => this.onFrameDecoded(frame),
                            error: (e) => this.onError(e)
                        });
                        this.initialized = false;
                        // 不再抛出异常，尝试解码
                    }
                }

                // 如果解码器关闭，重新创建
                if (!this.decoder || this.decoder.state === 'closed') {
                    console.log('🔄 解码器已关闭，重新创建...');
                    this.decoder = new VideoDecoder({
                        output: (frame) => this.onFrameDecoded(frame),
                        error: (e) => this.onError(e)
                    });
                    this.initialized = false;
                    // 重置后需要等待 SPS/PPS 才能配置
                    if (!this.sps || !this.pps) {
                        console.warn('⚠️ 需要等待 SPS/PPS 数据');
                        throw new Error('等待 SPS/PPS 数据...');
                    }
                    // 立即尝试配置
                    console.log('🔹 立即配置新解码器...');
                    const codecDesc = this.createDecoderConfig(this.sps, this.pps);
                    await this.decoder.configure(codecDesc);
                    console.log('🔹 重新配置完成，状态:', this.decoder.state);
                    if (this.decoder.state === 'configured') {
                        this.initialized = true;
                        console.log('✅ 解码器重新配置成功');
                    } else {
                        throw new Error('解码器重新配置失败，状态: ' + this.decoder.state);
                    }
                }

                if (!this.initialized) {
                    if (!isKeyFrame) {
                        console.warn('⏳ 解码器尚未配置，忽略非关键帧');
                        return;
                    }
                    throw new Error('解码器尚未配置，等待有效的 SPS/PPS');
                }

                // 根据 W3C WebCodecs 规范：
                // - 如果使用 description（AVCDecoderConfigurationRecord），bitstream 必须保持 AVCC 格式
                // - AVCC 格式使用长度前缀（不是起始码）

                // 步骤1: 先过滤 SEI NALU（如果需要）
                let filteredData = data;
                if (isKeyFrame && data.length > 4) {
                    const firstNaluLength = (data[0] << 24) | (data[1] << 16) | (data[2] << 8) | data[3];
                    const maxNaluLength = data.length - 4;

                    if (firstNaluLength > 0 && firstNaluLength <= maxNaluLength) {
                        // 检查第一个 NALU 类型
                        const firstNaluType = data[4] & 0x1F;

                        // 如果第一个 NALU 是 SEI（类型6），需要过滤掉
                        if (firstNaluType === 6) {
                            console.log('🔍 检测到 AVCC 格式的 SEI NALU，过滤...');
                            const filteredNalus = [];
                            let pos = 0;

                            while (pos < data.length) {
                                if (pos + 4 > data.length) break;

                                const naluLength = (data[pos] << 24) | (data[pos + 1] << 16) |
                                                  (data[pos + 2] << 8) | data[pos + 3];
                                pos += 4;

                                if (naluLength <= 0 || pos + naluLength > data.length) break;

                                const naluType = data[pos] & 0x1F;

                                // 跳过 SEI（类型6）和 AUD（类型9）
                                if (naluType === 6 || naluType === 9) {
                                    console.log(`🔍 跳过 ${naluType === 6 ? 'SEI' : 'AUD'} NALU（${naluLength}字节）`);
                                    pos += naluLength;
                                    continue;
                                }

                                // 保留这个 NALU
                                filteredNalus.push(data.slice(pos - 4, pos + naluLength));
                                pos += naluLength;
                            }

                            if (filteredNalus.length > 0) {
                                const totalLength = filteredNalus.reduce((sum, nalu) => sum + nalu.length, 0);
                                const result = new Uint8Array(totalLength);
                                let offset = 0;
                                for (const nalu of filteredNalus) {
                                    result.set(nalu, offset);
                                    offset += nalu.length;
                                }
                                console.log(`✅ SEI 过滤完成: ${data.length} → ${result.length} 字节`);
                                filteredData = result;
                            }
                        }
                    }
                }

                console.log('🔹 使用 AVCC 格式数据（用于 decode）:', {
                    type: isKeyFrame ? 'key' : 'delta',
                    dataLength: filteredData.length,
                    dataPrefix: Array.from(filteredData.slice(0, 12)).map(b => '0x' + b.toString(16).padStart(2, '0')).join(' ')
                });

                const chunk = new EncodedVideoChunk({
                    type: isKeyFrame ? 'key' : 'delta',
                    timestamp: performance.now(),
                    data: filteredData
                });

                console.log('🔹 EncodedVideoChunk 创建成功，开始解码...');

                try {
                    await this.decoder.decode(chunk);
                    console.log('✅ decode() 调用成功');
                } catch (e) {
                    console.error('❌ 解码 H.264 帧失败:', e);
                    console.error('   解码器状态:', this.decoder ? this.decoder.state : 'no decoder');
                    console.error('   帧类型:', isKeyFrame ? 'key' : 'delta');
                    console.error('   数据长度:', filteredData.length);
                    throw e;
                }
            }

            onFrameDecoded(frame) {
                if (!ctx) {
                    frame.close();
                    return;
                }

                // 调整 Canvas 大小
                if (canvas.width !== frame.displayWidth || canvas.height !== frame.displayHeight) {
                    canvas.width = frame.displayWidth;
                    canvas.height = frame.displayHeight;
                    document.getElementById('resolution').textContent =
                        `${frame.displayWidth}x${frame.displayHeight}`;
                }

                // 绘制帧
                ctx.drawImage(frame, 0, 0);

                // 更新帧计数
                frameCount++;

                // 清理帧
                frame.close();
            }

            onError(error) {
                console.error('H.264 解码器错误:', error);
            }

            createDecoderConfig(sps, pps) {
                console.log('🔍 createDecoderConfig - SPS 长度:', sps.length, 'PPS 长度:', pps.length);

                const spsNalu = this.normalizeParameterSet(sps, 7, 'SPS');
                const ppsNalu = this.normalizeParameterSet(pps, 8, 'PPS');
                if (spsNalu.length < 4) {
                    throw new Error('SPS 数据太短: ' + spsNalu.length);
                }

                console.log('🔍 createDecoderConfig - SPS 前16字节:', Array.from(spsNalu.slice(0, 16)).map(b => '0x' + b.toString(16).padStart(2, '0')).join(' '));
                console.log('🔍 createDecoderConfig - PPS 前8字节:', Array.from(ppsNalu.slice(0, 8)).map(b => '0x' + b.toString(16).padStart(2, '0')).join(' '));

                const profile = spsNalu[1];
                const compatibility = spsNalu[2];
                const level = spsNalu[3];
                const codec = `avc1.${[profile, compatibility, level].map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase()}`;

                return {
                    codec,
                    description: this.buildAVCC(profile, compatibility, level, spsNalu, ppsNalu),
                    optimizeForLatency: true
                };
            }

            normalizeParameterSet(data, expectedType, label) {
                let nalu = data;

                if (nalu.length >= 4 && nalu[0] === 0x00 && nalu[1] === 0x00 &&
                    nalu[2] === 0x00 && nalu[3] === 0x01) {
                    console.log(`🔍 ${label} 包含 4字节起始码，移除`);
                    nalu = nalu.slice(4);
                } else if (nalu.length >= 3 && nalu[0] === 0x00 && nalu[1] === 0x00 &&
                           nalu[2] === 0x01) {
                    console.log(`🔍 ${label} 包含 3字节起始码，移除`);
                    nalu = nalu.slice(3);
                }

                if (nalu.length === 0) {
                    throw new Error(`${label} 数据为空`);
                }

                const naluType = nalu[0] & 0x1F;
                if (naluType !== expectedType) {
                    throw new Error(`${label} NALU 类型错误: 期望=${expectedType}, 实际=${naluType}`);
                }

                return nalu;
            }

            // 构建AVCC字节数组
            buildAVCC(profile, compatibility, level, spsNalu, ppsNalu) {
                console.log(`🔍 构建AVCC: Profile=0x${profile.toString(16)}, Level=0x${level.toString(16)}`);
                console.log(`🔍 SPS NALU 长度: ${spsNalu.length}, PPS NALU 长度: ${ppsNalu.length}`);

                const avcc = new Uint8Array(
                    6 + // 配置记录
                    2 + spsNalu.length + // SPS
                    1 + // PPS 数量
                    2 + ppsNalu.length    // PPS
                );

                let offset = 0;

                // [配置记录] (6字节)
                avcc[offset++] = 1;            // configurationVersion
                avcc[offset++] = profile;      // profile
                avcc[offset++] = compatibility; // profileCompatibility
                avcc[offset++] = level;        // level
                avcc[offset++] = 0xFF;         // lengthSizeMinusOne (4字节长度前缀)
                avcc[offset++] = 0xE1;         // numOfSequenceParameterSets (1个SPS)

                // [SPS]
                avcc[offset++] = (spsNalu.length >> 8) & 0xFF; // SPS 长度
                avcc[offset++] = spsNalu.length & 0xFF;
                avcc.set(spsNalu, offset);
                offset += spsNalu.length;

                // [PPS]
                avcc[offset++] = 1;                            // numOfPictureParameterSets
                avcc[offset++] = (ppsNalu.length >> 8) & 0xFF; // PPS 长度
                avcc[offset++] = ppsNalu.length & 0xFF;
                avcc.set(ppsNalu, offset);

                console.log('🔍 AVCC 总长度:', avcc.length);
                console.log('🔍 AVCC 前20字节:', Array.from(avcc.slice(0, 20)).map(b => '0x' + b.toString(16).padStart(2, '0')).join(' '));

                return avcc;
            }

            close() {
                if (this.decoder) {
                    this.decoder.close();
                    this.decoder = null;
                }
                this.initialized = false;
            }
        }

        // 渲染帧到Canvas
        async function renderFrame(imageData) {
            if (!ctx) {
                console.error('Canvas context未初始化');
                return;
            }

            try {
                // 将Uint8Array转换为Blob (JPEG格式)
                const blob = new Blob([imageData], { type: 'image/jpeg' });

                // 解码JPEG图像
                const bitmap = await createImageBitmap(blob);

                // 调整Canvas大小
                if (canvas.width !== bitmap.width || canvas.height !== bitmap.height) {
                    canvas.width = bitmap.width;
                    canvas.height = bitmap.height;
                    document.getElementById('resolution').textContent =
                        `${bitmap.width}x${bitmap.height}`;
                }

                // 绘制图像
                ctx.drawImage(bitmap, 0, 0);

                // 更新帧计数
                frameCount++;

                // 清理bitmap
                bitmap.close();

            } catch (error) {
                console.error('渲染 JPEG 帧失败:', error);
            }
        }

        // 渲染 H.264 帧
        async function renderH264Frame(data, isKeyFrame, sps, pps) {
            if (!h264Decoder) {
                console.error('H.264 解码器未初始化');
                return;
            }

            try {
                await h264Decoder.decode(data, isKeyFrame, sps, pps);
            } catch (error) {
                console.error('解码 H.264 帧失败:', error);
                throw error;
            }
        }

        // WebSocket连接
        function connect() {
            setStatus('connecting', '连接中...');
            document.getElementById('sessionIdDisplay').textContent = sessionId;
            document.getElementById('sessionId').textContent = sessionId.substring(0, 8);

            ws = new WebSocket(wsURL);

            ws.onopen = () => {
                setStatus('connecting', '等待客户端...');

                // 发送编解码器支持信息
                ws.send(JSON.stringify({
                    type: 'codec_support',
                    h264: codecSupport.h264,
                    jpeg: codecSupport.jpeg
                }));

                // 请求立即发送关键帧（初始化解码器）
                console.log('📹 请求发送关键帧...');
                ws.send(JSON.stringify({
                    type: 'request_keyframe'
                }));
            };

            ws.onmessage = async (event) => {
                try {
                    const data = JSON.parse(event.data);
                    await handleMessage(data);
                } catch (e) {
                    console.error('处理消息失败:', e, '原始数据:', event.data);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket错误:', error);
                setStatus('error', '连接错误');
            };

            ws.onclose = () => {
                setStatus('disconnected', '连接已断开');
                isConnected = false;

                // 停止FPS更新
                if (fpsUpdateInterval) {
                    clearInterval(fpsUpdateInterval);
                }

                // 关闭 H.264 解码器
                if (h264Decoder) {
                    h264Decoder.close();
                    h264Decoder = null;
                    useH264 = false;
                }

                // 5秒后重连
                setTimeout(() => {
                    if (!isConnected) {
                        connect();
                    }
                }, 5000);
            };
        }

        // 处理消息
        async function handleMessage(data) {
            switch (data.type) {
                case 'init':
                    // 初始化Canvas
                    canvas = document.getElementById('vnc_canvas');
                    ctx = canvas.getContext('2d', { alpha: false });

                    // 显示Canvas
                    canvas.style.display = 'block';

                    // 启动FPS统计
                    lastFrameTime = performance.now();
                    fpsUpdateInterval = setInterval(updateFPS, 1000);

                    // 标记为已连接
                    setStatus('connected', '已连接');

                    // 设置Canvas事件监听器
                    setupCanvasEventListeners();
                    break;

                case 'frame':
                    // 首次接收到帧数据时初始化Canvas
                    if (!ctx) {
                        canvas = document.getElementById('vnc_canvas');
                        ctx = canvas.getContext('2d', { alpha: false });

                        // 显示Canvas
                        canvas.style.display = 'block';

                        // 启动FPS统计
                        lastFrameTime = performance.now();
                        fpsUpdateInterval = setInterval(updateFPS, 1000);

                        // 标记为已连接
                        setStatus('connected', '已连接');

                        // 设置Canvas事件监听器
                        setupCanvasEventListeners();

                        // 初始化 H.264 解码器（如果使用 H.264）
                        if (data.codec === 'h264' && codecSupport.h264) {
                            try {
                                h264Decoder = new H264Decoder();
                                await h264Decoder.init();
                                useH264 = true;
                                console.log('✅ 已启用 H.264 解码');
                            } catch (e) {
                                console.error('初始化 H.264 解码器失败:', e);
                                useH264 = false;
                            }
                        }
                    }

                    // 渲染帧数据
                    try {
                        if (data.codec === 'h264' && useH264) {
                            // H.264 解码路径
                            if (data.h264_data && data.h264_data.length > 0) {
                                // 解码 base64 数据
                                const binaryString = atob(data.h264_data);
                                const h264Data = new Uint8Array(binaryString.length);
                                for (let i = 0; i < binaryString.length; i++) {
                                    h264Data[i] = binaryString.charCodeAt(i);
                                }

                                // 解码 SPS/PPS
                                const sps = data.sps ? (() => {
                                    const spsString = atob(data.sps);
                                    const spsArray = new Uint8Array(spsString.length);
                                    for (let i = 0; i < spsString.length; i++) {
                                        spsArray[i] = spsString.charCodeAt(i);
                                    }
                                    return spsArray;
                                })() : null;

                                const pps = data.pps ? (() => {
                                    const ppsString = atob(data.pps);
                                    const ppsArray = new Uint8Array(ppsString.length);
                                    for (let i = 0; i < ppsString.length; i++) {
                                        ppsArray[i] = ppsString.charCodeAt(i);
                                    }
                                    return ppsArray;
                                })() : null;

                                console.log('📹 收到 H.264 帧:', {
                                    isKeyFrame: data.is_key_frame,
                                    dataLength: h264Data.length,
                                    spsLength: sps ? sps.length : 0,
                                    ppsLength: pps ? pps.length : 0
                                });

                                try {
                                    await renderH264Frame(
                                        h264Data,
                                        data.is_key_frame,
                                        sps,
                                        pps
                                    );
                                } catch (e) {
                                    // H.264 解码失败，尝试 JPEG 回退
                                    console.warn('H.264 解码失败，尝试 JPEG 回退:', e);
                                    if (data.data && data.data.length > 0) {
                                        const binaryString = atob(data.data);
                                        const imageData = new Uint8Array(binaryString.length);
                                        for (let i = 0; i < binaryString.length; i++) {
                                            imageData[i] = binaryString.charCodeAt(i);
                                        }
                                        await renderFrame(imageData);
                                    }
                                }
                            }
                        } else {
                            // JPEG 解码路径（默认或回退）
                            if (data.data && data.data.length > 0) {
                                const binaryString = atob(data.data);
                                const imageData = new Uint8Array(binaryString.length);
                                for (let i = 0; i < binaryString.length; i++) {
                                    imageData[i] = binaryString.charCodeAt(i);
                                }
                                await renderFrame(imageData);
                            }
                        }
                    } catch (e) {
                        console.error('处理帧数据失败:', e);
                    }
                    break;

                case 'input':
                    // 输入事件确认
                    break;
            }
        }

        // 发送输入事件
        function sendInput(eventType, data) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            const message = {
                type: 'input',
                session_id: sessionId,
                user_id: 'web',
                event_type: eventType,
                ...data
            };

            ws.send(JSON.stringify(message));
        }

        // 发送Canvas尺寸
        function sendCanvasSize() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            sendInput('canvas_size', {
                canvas_width: canvas.clientWidth,
                canvas_height: canvas.clientHeight
            });
        }

        // 设置Canvas事件监听器
        function setupCanvasEventListeners() {
            // 发送初始Canvas尺寸
            sendCanvasSize();

            // 监听Canvas尺寸变化
            const resizeObserver = new ResizeObserver(() => {
                sendCanvasSize();
            });
            resizeObserver.observe(canvas);

            // 鼠标事件
            let mouseButtonMask = 0;

            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (!document.getElementById('controlToggle').checked) return;

                mouseButtonMask |= (1 << e.button);
                sendInput('mouse', {
                    mouse_x: e.offsetX,
                    mouse_y: e.offsetY,
                    mouse_mask: mouseButtonMask,
                    canvas_width: canvas.clientWidth,
                    canvas_height: canvas.clientHeight
                });
            });

            canvas.addEventListener('mouseup', (e) => {
                e.preventDefault();
                if (!document.getElementById('controlToggle').checked) return;

                mouseButtonMask &= ~(1 << e.button);
                sendInput('mouse', {
                    mouse_x: e.offsetX,
                    mouse_y: e.offsetY,
                    mouse_mask: mouseButtonMask,
                    canvas_width: canvas.clientWidth,
                    canvas_height: canvas.clientHeight
                });
            });

            canvas.addEventListener('mousemove', (e) => {
                e.preventDefault();
                if (!document.getElementById('controlToggle').checked) return;

                sendInput('mouse', {
                    mouse_x: e.offsetX,
                    mouse_y: e.offsetY,
                    mouse_mask: mouseButtonMask,
                    canvas_width: canvas.clientWidth,
                    canvas_height: canvas.clientHeight
                });
            });

            // 防止右键菜单
            canvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
            });

            // 滚轮事件
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (!document.getElementById('controlToggle').checked) return;

                // VNC滚轮掩码：向上=8，向下=16
                let scrollMask = 0;
                if (e.deltaY < 0) {
                    scrollMask = 8;
                } else if (e.deltaY > 0) {
                    scrollMask = 16;
                }

                sendInput('mouse', {
                    mouse_x: e.offsetX,
                    mouse_y: e.offsetY,
                    mouse_mask: mouseButtonMask | scrollMask,
                    canvas_width: canvas.clientWidth,
                    canvas_height: canvas.clientHeight
                });

                // 发送滚轮复位
                setTimeout(() => {
                    sendInput('mouse', {
                        mouse_x: e.offsetX,
                        mouse_y: e.offsetY,
                        mouse_mask: mouseButtonMask,
                        canvas_width: canvas.clientWidth,
                        canvas_height: canvas.clientHeight
                    });
                }, 100);
            });
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('controlToggle').checked) return;
            e.preventDefault();
            sendInput('keyboard', { key_code: e.keyCode });
        });

        document.addEventListener('keyup', (e) => {
            if (!document.getElementById('controlToggle').checked) return;
            e.preventDefault();
            sendInput('keyboard', { key_code: -e.keyCode }); // 负数表示释放
        });

        // 延迟统计
        function measureLatency() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            const start = performance.now();
            ws.send(JSON.stringify({
                type: 'ping',
                timestamp: start
            }));

            // 记录发送时间用于延迟计算
            ws.lastPing = start;
        }

        // 接收pong消息计算延迟
        ws?.addEventListener('message', (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'pong') {
                    const latency = Math.round(performance.now() - data.timestamp);
                    document.getElementById('latency').textContent = latency + 'ms';
                }
            } catch (e) {
                // 忽略非JSON消息
            }
        });

        // 定期测量延迟
        setInterval(measureLatency, 2000);

        // 启动连接
        connect();

        // 页面可见性变化时优化
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                lastFrameTime = performance.now();
                frameCount = 0;
            }
        });
    </script>
</body>
</html>
